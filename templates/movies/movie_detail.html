{% extends "users/basic.html" %}
{% block content %}

<div class="container mt-4">
  <h2>{{ movie.name }}</h2>
  <img src="{{ movie.image.url }}" width="300" class="mb-3" />
  <p>{{ movie.description }}</p>

  <h4>Trailer</h4>
  {% if movie.trailer_url %}
  <div style="max-width: 500px; margin-bottom: 20px;">
    <a href="https://www.youtube.com/watch?v={{ movie.trailer_url }}" target="_blank" style="text-decoration: none;">
      <div style="position: relative; display: inline-block; width: 100%;">
        <img
          src="https://img.youtube.com/vi/{{ movie.trailer_url }}/hqdefault.jpg"
          alt="Watch Trailer"
          style="width: 100%; border-radius: 10px; display: block;"
        />
        <div style="
          position: absolute; top: 50%; left: 50%;
          transform: translate(-50%, -50%);
          background: rgba(255,0,0,0.88);
          border-radius: 50%;
          width: 70px; height: 70px;
          display: flex; align-items: center; justify-content: center;">
          <div style="
            width: 0; height: 0;
            border-top: 18px solid transparent;
            border-bottom: 18px solid transparent;
            border-left: 30px solid white;
            margin-left: 6px;">
          </div>
        </div>
      </div>
      <div class="mt-2">
        <span class="btn btn-danger btn-sm">▶ Watch Trailer on YouTube</span>
      </div>
    </a>
  </div>
  {% else %}
  <p class="text-muted">No trailer available.</p>
  {% endif %}

  <a href="{% url 'theater_list' movie.id %}" class="btn btn-primary">
    Book Tickets
  </a>
</div>

{% endblock %}
